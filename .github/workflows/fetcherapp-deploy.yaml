name: FetcherApp CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Login to DockerHub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }} 

      # - name: Build Docker image
      #   run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fetcherapp:latest ./fetcherapp/

      # - name: Login to ACR using PAT
      #   run: |
      #     echo ${{ secrets.AZ_ACR_PASSWORD }} | docker login ${{ secrets.AZ_ACR_LOGIN_SERVER }} \
      #       -u ${{ secrets.AZ_ACR_USERNAME }} --password-stdin

      - name: Login to ACR using SP
        run: |
          echo ${{ secrets.AZ_ACR_CLIENT_SECRET }} | docker login ${{ secrets.AZ_ACR_LOGIN_SERVER }} \
            -u ${{ secrets.AZ_ACR_CLIENT_ID }} --password-stdin


      - name: Build Docker image
        # run: docker build -t ${{ secrets.AZ_ACR_LOGIN_SERVER }}/fetcherapp:latest ./fetcherapp/

        run: |
          docker buildx create --use
          docker buildx build --platform linux/arm64 -t ${{ secrets.AZ_ACR_LOGIN_SERVER }}/fetcherapp:${{ github.sha }} --push ./fetcherapp/

      # - name: Push Docker image
      #   run: docker push ${{ secrets.AZ_ACR_LOGIN_SERVER }}/fetcherapp:latest