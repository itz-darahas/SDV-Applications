      # ------------------------
      # 4. Azure Login (for AKS access)
      # ------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      # ------------------------
      # 5. Get AKS credentials
      # ------------------------
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group SDV-CICD \
            --name sdv-aks-cluster \
            --overwrite-existing

      # ------------------------
      # 6. DEPLOY TO AKS (IMPORTANT STEP)
      # ------------------------
      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/fetcher-k8s/deployment.yaml
      # ------------------------
      # 7. Verify deployment
      # ------------------------
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/fetcherapp-deployment --timeout=300s