apiVersion: apps/v1
kind: Deployment
metadata:
  name: fetcherapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fetcherapp
  template:
    metadata:
      labels:
        app: fetcherapp
    spec:
      containers:
        - name: fetcherapp
          image: sdvapplicationsacr.azurecr.io/fetcherapp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000